name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SJTU-openclaw/package-lock.json

      - name: Install dependencies
        working-directory: SJTU-openclaw
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: SJTU-openclaw
        run: npx playwright install chromium

      - name: Build slides
        working-directory: SJTU-openclaw
        run: npx slidev build --base /openclaw-presentation/SJTU-openclaw/

      - name: Arrange output
        run: |
          mkdir -p _site/SJTU-openclaw
          cp -r SJTU-openclaw/dist/. _site/SJTU-openclaw/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}SJTU-openclaw/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
